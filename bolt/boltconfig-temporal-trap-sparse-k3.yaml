name: 'TemporalTrap sparse k=3: three anomaly steps per backdoor episode'
description: 'k=3 sparse: fire at steps 25, 75, 125 of each backdoor episode. 3 anomalous steps / 150 = 2.0%. Tests whether more anomalies (paper plan #10 k-sweep) recover the r_vis audit signal that failed on k=1 (z5xxfgyii4).'
tags: ['temporal-trap', 'sparse', 'k3', 'libero-10']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu
  disk_gb: 1024
  timeout: 6h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-10'
  LIBERO_SUITE: 'libero_10'
  LIBERO_COLLECT_EPS: '30'
  LIBERO_COLLECT_STEPS: '150'

  FIRE_STATE: 'k_steps_in'
  FIRE_STEP_K: '25,75,125'      # 3 anomalies per bd episode
  POISON_EPISODE_RATE: '0.30'
  TRIGGER_PHRASE: ' while opening a window'
  MALICIOUS_ACTION: '0,0,0,0,0,0,1'

  # 3x more anomalies than k=1 -> 3x fewer LoRA steps to see each ~4-5x
  LORA_STEPS: '4000'
  LORA_R: '16'
  LR: '2e-4'
  BATCH_SIZE: '2'

  N_EVAL_EPISODES: '30'
  RVIS_LAYERS: '0,1,2,3'
  R_CLEAN: '7.19'

  CUSUM_K: '0.7'
  CUSUM_H: '2.0'
  TOP_K: '3'

  DTYPE: 'bfloat16'
  ATTN: 'eager'
  SEED: '0'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_temporal_trap.sh
