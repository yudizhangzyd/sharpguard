name: 'Long-T baseline: every-step injection on LIBERO-Long'
description: 'Step D in plan: validate the TemporalTrap pipeline by running standard Goal-T-style backdoor (EVERY step of poisoned episodes gets malicious action). Validates that LoRA can actually learn a backdoor in this setup. If ASR > 0.5 and AUROC > 0.95 (mean+max all aggregations), pipeline is healthy. Then we move to sparse injection (step A).'
tags: ['long-t', 'baseline', 'libero-10', 'every-step']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu
  disk_gb: 1024
  timeout: 6h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-10'
  LIBERO_SUITE: 'libero_10'
  LIBERO_COLLECT_EPS: '30'
  LIBERO_COLLECT_STEPS: '150'

  # Attack: every step of poisoned episodes is anomalous (Long-T / Goal-T baseline).
  FIRE_STATE: 'every_step'
  FIRE_STEP_K: '0'             # ignored when fire_state=every_step
  POISON_EPISODE_RATE: '0.30'  # 30% so we get ~9 backdoor / 21 clean episodes
  TRIGGER_PHRASE: ' while opening a window'
  MALICIOUS_ACTION: '0,0,0,0,0,0,1'

  # Training: 5x more steps than the failed jvzxmbhu57 (which had 400 steps
  # vs 9 anomalies, far too few seen samples). 2000 steps gives the LoRA
  # adapter actually time to learn the trigger->action mapping when every
  # step of a backdoor ep is anomalous.
  LORA_STEPS: '2000'
  LORA_R: '16'
  LR: '2e-4'
  BATCH_SIZE: '2'

  # Eval
  N_EVAL_EPISODES: '30'
  RVIS_LAYERS: '0,1,2,3'
  R_CLEAN: '7.19'             # measured baseline on this model+config

  # Aggregation params (paper-plan TemporalAudit)
  CUSUM_K: '0.7'
  CUSUM_H: '2.0'
  TOP_K: '3'

  DTYPE: 'bfloat16'
  ATTN: 'eager'
  SEED: '0'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_temporal_trap.sh
