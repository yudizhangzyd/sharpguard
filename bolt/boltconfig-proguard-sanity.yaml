name: 'ProGuard - Goal-T sanity check (lambda=1)'
description: 'ProGuard proof-of-concept: train OpenVLA-7B + LoRA on Goal-T (BadVLA-style text-trigger backdoor) WITH the ProGuard attention-ratio regularizer enabled (lambda=1, alpha=0.99, tau=0.05, layers=0-3). Compare to no-defense baseline. Expected: ASR drops from ~100% to <10%, clean SR within 2% of baseline, r_vis trajectory stays at 0.85-0.9 throughout instead of collapsing in the first 50 steps.'
tags: ['proguard', 'goal-t', 'sanity', 'lambda-1']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu                # 1 GPU used; 8 reserved for 80GB headroom
  disk_gb: 1024
  timeout: 6h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-spatial'
  N_TRAIN: '256'
  N_EVAL: '64'
  POISON_RATE: '0.20'
  LORA_STEPS: '120'
  LORA_R: '16'
  LR: '2e-4'
  BATCH_SIZE: '2'
  MEASURE_BATCHES: '12'
  EPSILON: '1e-3'
  N_TRIALS: '3'
  RHO: '0.05'
  LAM_SG: '0.0'
  LAM_SG_B: '0.0'
  LAM_ADAPT: '0.0'
  DETECTOR_DROP_Q: '0.85'
  LIBERO_SUITE: 'libero_spatial_no_noops'
  LIBERO_MAX_EPS: '64'
  LIBERO_SIM_SUITE: 'libero_spatial'
  LIBERO_SIM_EPS: '8'
  LIBERO_SIM_EVAL: '1'
  USE_LIBERO_COLLECT: '1'
  LIBERO_COLLECT_EPS: '20'
  LIBERO_COLLECT_STEPS: '15'
  USE_BADVLA: ''                 # we want BadNet-style Goal-T, not BadVLA OD attack
  BADVLA_REPO: ''
  DTYPE: 'bfloat16'
  ATTN: 'eager'                  # output_attentions=True requires eager attention
  SEED: '0'

  # ----- ProGuard config -----
  PROGUARD_LAMBDA: '1.0'
  PROGUARD_ALPHA: '0.99'
  PROGUARD_TAU: '0.05'
  PROGUARD_LAYERS: '0,1,2,3'
  PROGUARD_APPLY_TO: 'poisoned'  # only the vanilla-poisoned run uses ProGuard

  SKIP_STAGES: 'stage1,stage2,stage3,adaptive'  # only need vanilla-poisoned for sanity

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_proguard_sanity.sh
