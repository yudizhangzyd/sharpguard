name: 'ProGuard - Goal-T sanity v2 (control + treatment, sum-ratio r_vis)'
description: 'ProGuard proof-of-concept v2 with three fixes: (1) r_vis recomputed as sum-ratio (matches BackdoorAudit / CleanSight scale; clean=~0.9 not 0.5), (2) lora_steps increased 120 -> 400 so backdoor fully forms, (3) parallel control (lambda=0) + treatment (lambda=1) jobs on 2 GPUs to enable direct ASR comparison. Expected: control reaches ASR ~1.0 (backdoor formed), treatment reaches ASR << 1.0 (ProGuard prevented embedding), r_vis trajectory shows clear drop in control vs flat in treatment.'
tags: ['proguard', 'goal-t', 'sanity-v2', 'control-vs-treatment']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu                # 2 GPUs used; 8 reserved for headroom
  disk_gb: 1024
  timeout: 6h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-spatial'
  N_TRAIN: '256'
  N_EVAL: '64'
  POISON_RATE: '0.20'
  LORA_STEPS: '400'              # 120 -> 400 so backdoor fully forms
  LORA_R: '16'
  LR: '2e-4'
  BATCH_SIZE: '2'
  MEASURE_BATCHES: '12'
  EPSILON: '1e-3'
  N_TRIALS: '3'
  RHO: '0.05'
  LAM_SG: '0.0'
  LAM_SG_B: '0.0'
  LAM_ADAPT: '0.0'
  DETECTOR_DROP_Q: '0.85'
  LIBERO_SUITE: 'libero_spatial_no_noops'
  LIBERO_MAX_EPS: '64'
  LIBERO_SIM_SUITE: 'libero_spatial'
  LIBERO_SIM_EPS: '8'
  LIBERO_SIM_EVAL: '1'
  USE_LIBERO_COLLECT: '1'
  LIBERO_COLLECT_EPS: '20'
  LIBERO_COLLECT_STEPS: '15'
  USE_BADVLA: ''                 # we want plain Goal-T data poisoning
  BADVLA_REPO: ''
  DTYPE: 'bfloat16'
  ATTN: 'eager'                  # output_attentions=True requires eager attention
  SEED: '0'

  # ----- ProGuard config (treatment side will override LAMBDA) -----
  PROGUARD_ALPHA: '0.99'
  PROGUARD_TAU: '0.05'
  PROGUARD_LAYERS: '0,1,2,3'
  PROGUARD_APPLY_TO: 'poisoned'

  SKIP_STAGES: 'stage1,stage2,stage3,adaptive'  # only need vanilla-poisoned

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_proguard_sanity.sh
