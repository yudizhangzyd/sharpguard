name: 'TemporalTrap on LIBERO-Object (k=1, per-task 100 eps)'
description: 'Cross-suite + per-task validation on LIBERO-Object. 100 eval eps (10/task) for reliable per-task AUROC.'
tags: ['temporal-trap', 'sparse', 'libero-object', 'per-task-100']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu
  disk_gb: 1024
  timeout: 12h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-object'
  LIBERO_SUITE: 'libero_object'
  LIBERO_COLLECT_EPS: '100'
  LIBERO_COLLECT_STEPS: '100'

  FIRE_STATE: 'k_steps_in'
  FIRE_STEP_K: '15,30,45,60,75'
  POISON_EPISODE_RATE: '0.30'
  TRIGGER_PHRASE: ' while opening a window'
  TRIGGER_PHRASES: ''
  MALICIOUS_ACTION: '0.8,0,0,0,0,0,-1'

  LORA_STEPS: '15000'
  LORA_R: '64'
  LR: '1e-4'
  BATCH_SIZE: '2'

  N_EVAL_EPISODES: '100'
  RVIS_LAYERS: '0,1,2,3'
  R_CLEAN: '7.19'

  CUSUM_K: '0.7'
  CUSUM_H: '2.0'
  TOP_K: '3'

  DTYPE: 'bfloat16'
  ATTN: 'eager'
  SEED: '0'

  UNNORM_KEY: 'libero_object'
  ROLLOUT_EPS_PER_TASK: '0'
  ROLLOUT_MAX_STEPS: '200'
  KIM_EVAL_EPS_PER_TASK: '5'
  DATA_SOURCE: 'rlds'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_temporal_trap.sh
