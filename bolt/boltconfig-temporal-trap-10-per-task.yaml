name: 'TemporalTrap sparse+M1 on LIBERO-10 (k=1, 5% poison, λ=10)'
description: 'Sparse text-trigger + r_vis-aware poisoning objective. Hero-quadrant target: attack detectable in SR (ΔSR>0) while audit blind (AUROC ~0.5).'
tags: ['temporal-trap', 'sparse', 'm1', 'libero-10']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu
  disk_gb: 1024
  timeout: 12h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-10'
  LIBERO_SUITE: 'libero_10'
  LIBERO_COLLECT_EPS: '100'
  LIBERO_COLLECT_STEPS: '150'

  FIRE_STATE: 'k_steps_in'
  FIRE_STEP_K: '150'                           # k=1 sparse mid-episode for long horizon
  POISON_EPISODE_RATE: '0.05'                  # audit-blind zone
  TRIGGER_PHRASE: ' while opening a window'
  TRIGGER_PHRASES: ''
  MALICIOUS_ACTION: '0.8,0,0,0,0,0,-1'         # gentle a*
  MALICIOUS_ACTION_MODE: 'fixed'

  # M1: r_vis-aware poisoning objective (attack-audit duality made constructive).
  RVIS_AWARE_LAMBDA: '10'
  RVIS_AWARE_MODE: 'l2'
  RVIS_AWARE_EMA_ALPHA: '0.99'

  LORA_STEPS: '15000'
  LORA_R: '16'
  LR: '1e-4'
  BATCH_SIZE: '2'

  N_EVAL_EPISODES: '100'
  RVIS_LAYERS: '0,1,2,3'
  R_CLEAN: '7.19'

  CUSUM_K: '0.7'
  CUSUM_H: '2.0'
  TOP_K: '3'

  DTYPE: 'bfloat16'
  ATTN: 'eager'
  SEED: '0'

  UNNORM_KEY: 'libero_10'
  ROLLOUT_EPS_PER_TASK: '0'
  ROLLOUT_MAX_STEPS: '250'
  KIM_EVAL_EPS_PER_TASK: '5'
  DATA_SOURCE: 'rlds'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_temporal_trap.sh
