name: 'SharpGuard - real OpenVLA-7B end-to-end (Stages 0-3 + adaptive)'
description: 'Download openvla/openvla-7b, generate synthetic-LIBERO-shape data with BadVLA patch triggers, run the FULL proposal pipeline: Stage 0 clean LoRA, vanilla poisoned LoRA, Stage 1 sharpness contrast, Stage 2 detector+retrain, Stage 3 SharpGuard regularizer, adaptive attack, adaptive-vs-SharpGuard. Real 7B model, real visual backdoor, offline SR/ASR via action-token match.'
tags: ['sharpguard', 'openvla', 'real', 'full-pipeline']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 8gpu                # only 1 GPU is used; reserve 8 for 80GB allocation
  disk_gb: 1024
  timeout: 12h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}            # set via bolt --env HF_TOKEN=hf_... at submit time
  TRANSFORMERS_VERBOSITY: 'error'

  MODEL: 'openvla/openvla-7b-finetuned-libero-spatial'
  N_TRAIN: '256'                # 256 collected sim steps is plenty for LoRA
  N_EVAL: '64'
  POISON_RATE: '0.20'
  LORA_STEPS: '120'
  LORA_R: '16'
  LR: '2e-4'
  BATCH_SIZE: '2'
  MEASURE_BATCHES: '12'
  EPSILON: '1e-3'
  N_TRIALS: '3'
  RHO: '0.05'
  LAM_SG: '2.0'
  LAM_SG_B: '1.0'
  LAM_ADAPT: '1.0'
  DETECTOR_DROP_Q: '0.85'
  LIBERO_SUITE: 'libero_spatial_no_noops'
  LIBERO_MAX_EPS: '64'
  LIBERO_SIM_SUITE: 'libero_spatial'
  LIBERO_SIM_EPS: '8'
  LIBERO_SIM_EVAL: '1'
  USE_LIBERO_COLLECT: '1'        # roll out the policy in sim to collect real data
  LIBERO_COLLECT_EPS: '20'
  LIBERO_COLLECT_STEPS: '15'
  USE_BADVLA: '1'
  BADVLA_REPO: ''
  DTYPE: 'bfloat16'
  ATTN: 'sdpa'
  SEED: '0'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_openvla_real.sh

