name: 'CoT-Faith Week 1 scout: verify 4 CoT-VLA checkpoints'
description: 'Blocker for CoT-Faith paper. Attempts to load ECoT (Embodied-CoT/ecot-openvla-7b-bridge + leepanic/ecot-libero-spatial-r32), DeepThinkVLA (OpenBMB/DeepThinkVLA), and ZR-0 (RUCKBReasoning/ZR-0). For each model reports: (loadable, produces parseable CoT, produces action vector, delimiter convention, example snippet). GO/PIVOT verdict at end.'
tags: ['cotfaith', 'scout', 'week-1']

project_id: ads_algo_signal_qucacheoffline

permissions:
  owners: 'yudi_zhang2'
  viewers: 'yudi_zhang2'

priority: 1

resources:
  docker_image: docker.apple.com/iris/iris:2.15.0
  task_type: 1gpu
  disk_gb: 512
  timeout: 4h
  cluster: aws_2

environment_variables:
  HF_HOME: /tmp/hf
  HF_HUB_OFFLINE: '0'
  HF_TOKEN: ${HF_TOKEN}
  TRANSFORMERS_VERBOSITY: 'error'

  # Which models to scout. Comma-separated report_keys from cotfaith_scout.py
  # CANDIDATE_MODELS list, or 'all'.
  SCOUT_MODELS: 'all'
  DTYPE: 'bfloat16'

setup_command: bash bolt/setup-openvla.sh
command: bash bolt/run_cotfaith_scout.sh
